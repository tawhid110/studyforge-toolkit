<link rel="stylesheet" href="components/pdf-extractor/pdf-extractor.css">

<div class="module-container">
    <h2>PDF Extractor</h2>
    <p>Upload a large PDF (like <i>Calculus Early Transcendentals</i>) and extract specific pages. Enter page ranges using commas and dashes (e.g., <b>1-5, 8, 11-13</b>).</p>
    
    <div class="upload-section">
        <input type="file" id="pdf-input" accept="application/pdf">
    </div>
    
    <div class="input-group">
        <label for="pages-input">Pages to Extract:</label>
        <input type="text" id="pages-input" placeholder="e.g., 1-5, 10, 12-15">
    </div>
    
    <button id="extract-btn" class="primary-btn">Extract Pages</button>
    <p id="status-message"></p>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="components/pdf-extractor/pdf-extractor.js"></script>
