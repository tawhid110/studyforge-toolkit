<link rel="stylesheet" href="components/citation-builder/citation-builder.css">

<div class="module-container">
    <h2>Citation Builder</h2>
    <p>Enter a book's ISBN (e.g., 9780140283334 for <i>The Crucible</i> by Arthur Miller) to generate a citation instantly.</p>
    
    <div class="search-bar">
        <input type="text" id="isbn-input" placeholder="Enter 10 or 13 digit ISBN...">
        <button id="search-btn" class="primary-btn">Generate</button>
    </div>
    
    <p id="status-message"></p>

    <div id="citation-results" class="results-container hidden">
        <h3 id="book-title"></h3>
        
        <div class="citation-box">
            <strong>APA Format:</strong>
            <p id="apa-citation"></p>
        </div>
        
        <div class="citation-box">
            <strong>MLA Format:</strong>
            <p id="mla-citation"></p>
        </div>
    </div>
</div>

<script src="components/citation-builder/citation-builder.js"></script>
