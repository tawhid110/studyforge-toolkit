<link rel="stylesheet" href="components/flashcard-maker/flashcard-maker.css">

<div class="module-container">
    <h2>Flashcard Maker (Anki Export)</h2>
    <p>Paste your notes using a dash (-) or colon (:) to separate the front and back of the card. Example: <b>Mitochondria - The powerhouse of the cell</b>.</p>
    
    <textarea id="flashcard-input" placeholder="George Washington - The first President of the United States&#10;Photosynthesis: The process by which plants make their own food"></textarea>
    
    <button id="export-btn" class="primary-btn">Export to Anki (.csv)</button>
    <p id="status-message"></p>
</div>

<script src="components/flashcard-maker/flashcard-maker.js"></script>
