<link rel="stylesheet" href="components/speech-reader/speech-reader.css">

<div class="module-container">
    <h2>Speech Reader</h2>
    <p>Paste your notes or reading material below and let the browser read it aloud to you.</p>
    
    <textarea id="text-input" placeholder="Paste your text here..."></textarea>
    
    <div class="controls-grid">
        <div class="control-group">
            <label for="voice-select">Voice:</label>
            <select id="voice-select"></select>
        </div>
        
        <div class="control-group">
            <label for="rate-input">Speed:</label>
            <input type="range" id="rate-input" min="0.5" max="2" value="1" step="0.1">
            <span id="rate-value">1.0x</span>
        </div>
    </div>
    
    <div class="button-group">
        <button id="play-btn" class="primary-btn play-btn">Play</button>
        <button id="pause-btn" class="secondary-btn">Pause</button>
        <button id="stop-btn" class="secondary-btn">Stop</button>
    </div>
</div>

<script src="components/speech-reader/speech-reader.js"></script>
