<link rel="stylesheet" href="components/text-analyzer/text-analyzer.css">

<div class="module-container">
    <h2>Text Analyzer</h2>
    <p>Paste an essay (like your paper on <i>The Great Gatsby</i>) to calculate stats. The browser will automatically underline spelling errors.</p>
    
    <div class="controls-row">
        <label for="lang-select">Spellcheck Dictionary:</label>
        <select id="lang-select">
            <option value="en-US">English (United States)</option>
            <option value="en-GB">English (United Kingdom)</option>
        </select>
    </div>
    
    <textarea id="analyzer-input" spellcheck="true" lang="en-US" placeholder="Paste your text here..."></textarea>
    
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Words</h3>
            <p id="word-count">0</p>
        </div>
        <div class="stat-card">
            <h3>Characters</h3>
            <p id="char-count">0</p>
        </div>
        <div class="stat-card">
            <h3>Reading Time</h3>
            <p id="read-time">0 min</p>
        </div>
    </div>
</div>

<script src="components/text-analyzer/text-analyzer.js"></script>
